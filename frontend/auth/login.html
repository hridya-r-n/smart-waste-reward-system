<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auth — SmartCity</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="splash">
    <div class="auth-card">
      <div class="corner-tl"></div>
      <div class="corner-br"></div>

      <div class="auth-logo">
        <span class="icon">⬡</span>
        <h1>System Access</h1>
        <p>// authenticate to continue</p>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input id="email" type="email" placeholder="user@smartcity.net" autocomplete="email">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input id="password" type="password" placeholder="••••••••" autocomplete="current-password">
      </div>

      <button id="login-btn" class="btn" onclick="login()">Authenticate</button>

      <div class="divider"></div>

      <button class="btn btn-ghost" onclick="goBack()">← Back</button>

      <div class="auth-footer">
        No account? <a href="register.html">Register →</a>
      </div>
    </div>
  </div>

  <script src="../js/main.js"></script>
  <script src="../js/auth.js"></script>
</body>
</html>
