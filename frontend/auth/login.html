<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auth — SmartCity</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>
  <div class="auth-container">
    <div class="auth-card">

    <div class="auth-logo">
      <h1>System Access</h1>
      <p>Authenticate to continue</p>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="user@smartcity.net">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password">
    </div>

    <button id="login-btn" class="btn" onclick="login()">Login</button>

    <p class="auth-footer">
      No account? <a href="register.html">Register</a>
    </p>

    <button class="btn btn-ghost" onclick="goBack()">← Back</button>

  </div>
  </div>
  

  <script src="../js/main.js"></script>
  <script src="../js/auth.js"></script>
</body>
</html>
