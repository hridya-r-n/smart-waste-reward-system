<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — SmartCity</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>
  <div class="auth-card">

    <div class="auth-logo">
      <h1>New Citizen</h1>
      <p>Create your account</p>
    </div>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="name" placeholder="Display name">
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="user@smartcity.net">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password">
    </div>

    <button class="btn" onclick="register()">Create Account</button>

    <p class="auth-footer">
      Already registered? <a href="login.html">Sign in</a>
    </p>

    <button class="btn btn-ghost" onclick="goBack()">← Back</button>

  </div>

  <script src="../js/main.js"></script>
  <script src="../js/auth.js"></script>
</body>
</html>
